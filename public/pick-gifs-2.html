<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick GIFs Round 2</title>
  <style>
    body { font-family: system-ui; background: #0a0e17; color: #e8ecf4; padding: 20px; max-width: 1000px; margin: 0 auto; }
    h1 { color: #3b82f6; }
    .exercise { border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 24px; background: #111827; }
    .exercise-name { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
    .exercise-desc { color: #9ca3af; font-size: 14px; margin-bottom: 12px; }
    .options { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .option { border: 2px solid #1f2937; border-radius: 8px; padding: 8px; cursor: pointer; transition: all 0.2s; }
    .option:hover { border-color: #3b82f6; }
    .option.selected { border-color: #22c55e; background: #22c55e10; }
    .option img { width: 100%; border-radius: 4px; background: #000; min-height: 120px; }
    .option-label { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .none-btn { border: 2px dashed #ef4444; border-radius: 8px; padding: 20px; cursor: pointer; text-align: center; color: #ef4444; }
    .none-btn.none-selected { background: #ef444420; }
    #sticky { position: sticky; top: 0; background: #0a0e17; padding: 12px 0; border-bottom: 1px solid #1f2937; z-index: 10; }
    #results { font-family: monospace; font-size: 12px; white-space: pre-wrap; background: #1f2937; padding: 12px; border-radius: 8px; margin-top: 20px; display: none; }
    button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: #3b82f6; color: #fff; }
    p { color: #9ca3af; margin: 4px 0; }
  </style>
</head>
<body>
  <div id="sticky">
    <h1>Round 2 — New Candidates</h1>
    <p>Found more specific GIFs. Pick the best or "None".</p>
    <p>Progress: <span id="count">0</span>/11</p>
    <button onclick="showResults()">Generate Result</button>
  </div>
  <div id="exercises"></div>
  <div id="results"></div>

  <script>
    const exercises = [
      { id: 'doorway-chest-stretch', name: 'Doorway Chest Stretch', desc: 'Arm on doorframe at 90°, step through gently, feel stretch in chest/front shoulder', options: [
        { url: 'https://i.makeagif.com/media/5-04-2025/IuVHwU.gif', label: 'Doorway chest stretch — pectoralis major/minor (MakeAGif)' },
      ]},
      { id: 'kneeling-hip-flexor', name: 'Hip Flexor Stretch (Kneeling)', desc: 'Kneel on one knee in lunge position, push hips forward to stretch front of hip', options: [
        { url: 'https://i.makeagif.com/media/8-20-2015/H3b1Kr.gif', label: 'Hip flexors foam rolling (MakeAGif) — not exact but shows hip flexor area' },
      ]},
      { id: 'foam-roll-hip-flexors', name: 'Foam Roll — Hip Flexors', desc: 'Lie face down, roller under hip/front thigh area, roll slowly', options: [
        { url: 'https://i.makeagif.com/media/8-20-2015/H3b1Kr.gif', label: 'Hip flexors foam rolling (MakeAGif)' },
      ]},
      { id: 'seated-spinal-twist', name: 'Seated Spinal Twist', desc: 'Sit cross-legged, hand on opposite knee, twist torso gently to one side', options: [
        { url: 'https://i.makeagif.com/media/4-15-2015/G9mk1u.gif', label: 'Exercise Library: Sitting Twists (MakeAGif)' },
      ]},
      { id: 'deep-neck-flexor', name: 'Deep Neck Flexor (Chin Tuck)', desc: 'Lie on back, gently tuck chin to chest without lifting head, hold 5s', options: [
        { url: 'https://i.makeagif.com/media/11-08-2023/whDGb-.gif', label: 'How to carry out the chin tuck posture (MakeAGif)' },
      ]},
      { id: 'thoracic-extension', name: 'Thoracic Extension (Foam Roller)', desc: 'Foam roller under shoulder blades, hands behind head, extend/arch back over roller', options: [
        { url: 'https://i.makeagif.com/media/6-05-2023/L8wTdz.gif', label: 'Top 5 Thoracic Spine Mobility Drills (MakeAGif)' },
      ]},
      { id: 'foam-roll-thoracic', name: 'Foam Roll — Thoracic Spine', desc: 'Foam roller under mid-back, arms crossed, roll up and down 6-8 inches', options: [
        { url: 'https://i.makeagif.com/media/6-05-2023/L8wTdz.gif', label: 'Top 5 Thoracic Spine Mobility Drills (MakeAGif)' },
        { url: 'https://static.exercisedb.dev/media/isofgzg.gif', label: 'Roller back stretch (ExerciseDB)' },
      ]},
      { id: 'foam-roll-lats', name: 'Foam Roll — Lats', desc: 'Lie on side, roller under armpit/lat area, roll up and down slowly', options: [
        { url: 'https://static.exercisedb.dev/media/c3Pfhti.gif', label: 'Roller side lat stretch (ExerciseDB)' },
        { url: 'https://static.exercisedb.dev/media/isofgzg.gif', label: 'Roller back stretch (ExerciseDB)' },
      ]},
      { id: 'band-pull-aparts', name: 'Band Pull-Aparts', desc: 'Hold resistance band at chest height arms straight, pull apart squeezing shoulder blades', options: [
        { url: 'https://i.makeagif.com/media/7-06-2023/aSkry5.gif', label: 'Scapular retractions with band (MakeAGif)' },
        { url: 'https://media.tenor.com/IrYw1RzccdoAAAAC/resistance-bands-workout.gif', label: 'Resistance bands workout (Tenor)' },
      ]},
      { id: 'hip-flexor-priority', name: 'Kneeling Hip Flexor Stretch (daily)', desc: 'Same as kneeling hip flexor — kneeling lunge, push hips forward', options: [
        { url: 'https://i.makeagif.com/media/8-20-2015/H3b1Kr.gif', label: 'Hip flexors foam rolling (MakeAGif)' },
      ]},
      { id: 'doorway-chest-priority', name: 'Doorway Chest Stretch (daily)', desc: 'Same — arm on doorframe, step through, stretch chest', options: [
        { url: 'https://i.makeagif.com/media/5-04-2025/IuVHwU.gif', label: 'Doorway chest stretch (MakeAGif)' },
      ]},
    ];

    const picks = {};
    let count = 0;
    const container = document.getElementById('exercises');

    for (const ex of exercises) {
      const div = document.createElement('div');
      div.className = 'exercise';
      let html = `<div class="exercise-name">${ex.name}</div><div class="exercise-desc"><strong>Should show:</strong> ${ex.desc}</div><div class="options">`;
      ex.options.forEach((opt, i) => {
        html += `<div class="option" id="opt-${ex.id}-${i}" onclick="pick('${ex.id}',${i},'${opt.url.replace(/'/g,"\\'")}')"><img src="${opt.url}" loading="lazy"><div class="option-label">${opt.label}</div></div>`;
      });
      html += `<div class="none-btn" id="none-${ex.id}" onclick="pickNone('${ex.id}')">✗ None match</div></div>`;
      div.innerHTML = html;
      container.appendChild(div);
    }

    function pick(id, i, url) { if(!(id in picks))count++; picks[id]=url; document.querySelectorAll('[id^=opt-'+id+'-]').forEach(e=>e.className='option'); document.getElementById('none-'+id).className='none-btn'; document.getElementById('opt-'+id+'-'+i).className='option selected'; document.getElementById('count').textContent=count; }
    function pickNone(id) { if(!(id in picks))count++; picks[id]='NONE'; document.querySelectorAll('[id^=opt-'+id+'-]').forEach(e=>e.className='option'); document.getElementById('none-'+id).className='none-btn none-selected'; document.getElementById('count').textContent=count; }
    function showResults() {
      const el = document.getElementById('results');
      el.textContent = 'ROUND 2 PICKS:\n\n' + exercises.map(e => e.id + ': ' + (picks[e.id]||'NOT REVIEWED')).join('\n');
      el.style.display = 'block'; el.scrollIntoView();
    }
  </script>
</body>
</html>
