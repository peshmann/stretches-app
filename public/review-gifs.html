<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise GIF Review</title>
  <style>
    body { font-family: system-ui; background: #0a0e17; color: #e8ecf4; padding: 20px; max-width: 900px; margin: 0 auto; }
    h1 { color: #3b82f6; }
    .exercise { border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 16px; background: #111827; }
    .exercise.wrong { border-color: #ef4444; }
    .exercise.ok { border-color: #22c55e; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .name { font-size: 18px; font-weight: bold; }
    .id { font-size: 12px; color: #9ca3af; }
    .source { font-size: 11px; color: #60a5fa; }
    img { max-width: 100%; max-height: 300px; border-radius: 8px; background: #000; display: block; margin: 8px 0; }
    .buttons { display: flex; gap: 8px; margin-top: 8px; }
    button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
    .btn-ok { background: #22c55e; color: #000; }
    .btn-wrong { background: #ef4444; color: #fff; }
    .btn-ok:hover { background: #16a34a; }
    .btn-wrong:hover { background: #dc2626; }
    #summary { position: sticky; top: 0; background: #0a0e17; padding: 12px 0; border-bottom: 1px solid #1f2937; z-index: 10; margin-bottom: 20px; }
    #results { font-family: monospace; font-size: 12px; white-space: pre-wrap; background: #1f2937; padding: 12px; border-radius: 8px; margin-top: 20px; display: none; }
    p { color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>
  <div id="summary">
    <h1>Exercise GIF Review</h1>
    <p>For each exercise, check if the GIF matches. Mark as OK or Wrong.</p>
    <p>Progress: <span id="count">0</span>/38 reviewed | <span id="okCount" style="color:#22c55e">0 OK</span> | <span id="wrongCount" style="color:#ef4444">0 Wrong</span></p>
    <button onclick="showResults()" style="background:#3b82f6;color:#fff;margin-top:8px">Show Wrong List (copy for Claude)</button>
  </div>
  <div id="exercises"></div>
  <div id="results"></div>

  <script>
    const gifs = {
      'dead-bug': { name: 'Dead Bug', desc: 'Lie on back, arms up, lower opposite arm+leg', url: 'https://static.exercisedb.dev/media/iny3m5y.gif', source: 'ExerciseDB' },
      'plank': { name: 'Front Plank', desc: 'Forearms on ground, body straight, hold position', url: 'https://static.exercisedb.dev/media/VBAWRPG.gif', source: 'ExerciseDB' },
      'side-plank': { name: 'Side Plank', desc: 'On forearm, body sideways, hold position', url: 'https://static.exercisedb.dev/media/5VXmnV5.gif', source: 'ExerciseDB' },
      'pallof-press': { name: 'Cable Pallof Press', desc: 'Stand sideways to cable, press handle straight out, resist rotation', url: 'https://static.exercisedb.dev/media/9pa4H5m.gif', source: 'ExerciseDB' },
      'cable-rows': { name: 'Seated Cable Row', desc: 'Pull cable to sternum, squeeze shoulder blades', url: 'https://static.exercisedb.dev/media/hvV79Si.gif', source: 'ExerciseDB' },
      'lat-pulldown': { name: 'Lat Pulldown (Wide Grip)', desc: 'Pull bar to upper chest, wide grip', url: 'https://static.exercisedb.dev/media/LEprlgG.gif', source: 'ExerciseDB' },
      'glute-bridge': { name: 'Barbell Glute Bridge', desc: 'Lie on back, drive hips up, squeeze glutes', url: 'https://static.exercisedb.dev/media/qKBpF7I.gif', source: 'ExerciseDB' },
      'glute-bridge-activation': { name: 'Glute Bridge (Activation)', desc: 'Bodyweight glute bridges, squeeze at top', url: 'https://static.exercisedb.dev/media/qKBpF7I.gif', source: 'ExerciseDB' },
      'goblet-squat': { name: 'Goblet Squat', desc: 'Hold weight at chest, squat to parallel', url: 'https://static.exercisedb.dev/media/yn8yg1r.gif', source: 'ExerciseDB' },
      'reverse-lunges': { name: 'Reverse Lunges (Dumbbell)', desc: 'Step backward into lunge, push through front heel', url: 'https://static.exercisedb.dev/media/SSsBDwB.gif', source: 'ExerciseDB' },
      'doorway-chest-stretch': { name: 'Doorway Chest Stretch', desc: 'Arm on doorframe at 90°, step through, stretch chest', url: 'https://static.exercisedb.dev/media/chfnQnM.gif', source: 'ExerciseDB' },
      'doorway-chest-priority': { name: 'Doorway Chest Stretch (daily)', desc: 'Same as above — arm on doorframe, stretch chest', url: 'https://static.exercisedb.dev/media/chfnQnM.gif', source: 'ExerciseDB' },
      'kneeling-hip-flexor': { name: 'Hip Flexor Stretch (Kneeling)', desc: 'Kneeling lunge, push hips forward', url: 'https://static.exercisedb.dev/media/tFGKm99.gif', source: 'ExerciseDB' },
      'hip-flexor-priority': { name: 'Kneeling Hip Flexor Stretch (daily)', desc: 'Same — kneeling, push hips forward', url: 'https://static.exercisedb.dev/media/tFGKm99.gif', source: 'ExerciseDB' },
      'foam-roll-hip-flexors': { name: 'Foam Roll - Hip Flexors', desc: 'Face down, roller under hip area, roll slowly', url: 'https://static.exercisedb.dev/media/tFGKm99.gif', source: 'ExerciseDB' },
      'neck-stretches': { name: 'Neck Stretches (All Directions)', desc: 'Tilt head side to side, look over shoulders, chin down', url: 'https://static.exercisedb.dev/media/oQRJYkC.gif', source: 'ExerciseDB' },
      'figure-4-stretch': { name: 'Figure-4 Stretch (Piriformis)', desc: 'Lie on back, cross ankle over knee, pull thigh to chest', url: 'https://static.exercisedb.dev/media/QY39eBr.gif', source: 'ExerciseDB' },
      'hamstring-stretch': { name: 'Hamstring Stretch', desc: 'Lie on back, extend leg up, pull toward you', url: 'https://static.exercisedb.dev/media/99rWm7w.gif', source: 'ExerciseDB' },
      'lat-stretch': { name: 'Lat Stretch (Side Bend)', desc: 'Extend arm overhead, lean to side', url: 'https://static.exercisedb.dev/media/f38OEuO.gif', source: 'ExerciseDB' },
      'seated-spinal-twist': { name: 'Seated Spinal Twist', desc: 'Sit cross-legged, twist torso, hand on opposite knee', url: 'https://static.exercisedb.dev/media/2jl9K55.gif', source: 'ExerciseDB' },
      'light-cardio-a': { name: 'Light Cardio Warm-up', desc: 'Rowing machine, bike, or treadmill walk', url: 'https://static.exercisedb.dev/media/rjiM4L3.gif', source: 'ExerciseDB' },
      'light-cardio-b': { name: 'Light Cardio Warm-up (B)', desc: 'Same — rowing, bike, or treadmill', url: 'https://static.exercisedb.dev/media/rjiM4L3.gif', source: 'ExerciseDB' },
      'wall-angels': { name: 'Wall Angels', desc: 'Back against wall, arms in W, slide up overhead keeping contact', url: 'https://i.makeagif.com/media/10-16-2019/6Oc6Qm.gif', source: 'MakeAGif' },
      'bird-dog': { name: 'Bird Dog', desc: 'Hands and knees, extend opposite arm and leg, hold', url: 'https://i.makeagif.com/media/11-19-2014/E7Spmi.gif', source: 'MakeAGif' },
      'band-pull-aparts': { name: 'Band Pull-Aparts', desc: 'Hold band at chest, pull apart by squeezing shoulder blades', url: 'https://i.makeagif.com/media/7-06-2023/aSkry5.gif', source: 'MakeAGif' },
      'thread-the-needle': { name: 'Thread the Needle', desc: 'Hands and knees, thread arm under body, lower shoulder to ground', url: 'https://i.makeagif.com/media/2-17-2023/9AdAkA.gif', source: 'MakeAGif' },
      'thread-the-needle-priority': { name: 'Thread the Needle (daily)', desc: 'Same — thread arm under, lower shoulder, feel upper back stretch', url: 'https://i.makeagif.com/media/2-17-2023/9AdAkA.gif', source: 'MakeAGif' },
      'deep-neck-flexor': { name: 'Deep Neck Flexor (Chin Tuck)', desc: 'Lie on back, gently tuck chin to chest, hold 5s', url: 'https://i.makeagif.com/media/12-12-2024/y3xgeu.gif', source: 'MakeAGif' },
      'thoracic-extension': { name: 'Thoracic Extension (Foam Roller)', desc: 'Roller under shoulder blades, hands behind head, extend back', url: 'https://i.makeagif.com/media/6-19-2021/QYQW8W.gif', source: 'MakeAGif' },
      'foam-roll-thoracic': { name: 'Foam Roll - Thoracic Spine', desc: 'Roller under mid-back, roll up and down', url: 'https://i.makeagif.com/media/11-01-2016/rb2_Bt.gif', source: 'MakeAGif' },
      'foam-roll-lats': { name: 'Foam Roll - Lats', desc: 'Lie on side, roller under armpit/lat, roll slowly', url: 'https://i.makeagif.com/media/11-01-2016/rb2_Bt.gif', source: 'MakeAGif' },
      'cable-face-pulls': { name: 'Cable Face Pulls', desc: 'Cable at head height, pull rope to face, squeeze shoulder blades', url: 'https://media.tenor.com/FGsBtkQCchwAAAAC/face-pull.gif', source: 'Tenor' },
      'single-leg-glute-bridge': { name: 'Single-Leg Glute Bridge', desc: 'One leg extended, drive hips up on planted foot', url: 'https://media.tenor.com/6e9R6ktpmjQAAAAC/single-leg-butt-bridge.gif', source: 'Tenor' },
      'childs-pose': { name: "Child's Pose", desc: 'Kneel, sit back on heels, extend arms forward on ground', url: 'https://media.tenor.com/aSrCPRHv8aEAAAAC/childs-pose-yoga-pose.gif', source: 'Tenor' },
      'childs-pose-priority': { name: "Child's Pose (daily)", desc: 'Same — kneel, sit back, extend arms, relax', url: 'https://media.tenor.com/aSrCPRHv8aEAAAAC/childs-pose-yoga-pose.gif', source: 'Tenor' },
      'clamshells': { name: 'Clamshells', desc: 'Lie on side, knees bent, lift top knee keeping feet together', url: 'https://media.tenor.com/6I8f5HYyIq0AAAAC/clam-exercise.gif', source: 'Tenor' },
      'cat-cow': { name: 'Cat-Cow Stretch', desc: 'Hands and knees, arch back (cow) then round back (cat)', url: 'https://media.tenor.com/LPwFzdwK9AEAAAAC/cat-cow-stretch.gif', source: 'Tenor' },
      'cat-cow-stretch': { name: 'Cat-Cow Stretch (daily)', desc: 'Same — arch and round back on hands and knees', url: 'https://media.tenor.com/LPwFzdwK9AEAAAAC/cat-cow-stretch.gif', source: 'Tenor' },
      'foam-roll-quads': { name: 'Foam Roll - Quads', desc: 'Face down, roller under thighs, roll hip to knee', url: 'https://media.tenor.com/L5Cf_i73nXcAAAAC/rouleau.gif', source: 'Tenor' },
    };

    const state = {};
    let reviewed = 0, okCount = 0, wrongCount = 0;

    const container = document.getElementById('exercises');
    for (const [id, ex] of Object.entries(gifs)) {
      const div = document.createElement('div');
      div.className = 'exercise';
      div.id = 'ex-' + id;
      div.innerHTML = `
        <div class="header">
          <div>
            <div class="name">${ex.name}</div>
            <div class="id">${id}</div>
          </div>
          <div class="source">${ex.source}</div>
        </div>
        <p style="margin:4px 0;font-size:13px"><strong>Should show:</strong> ${ex.desc}</p>
        <img src="${ex.url}" alt="${ex.name}" loading="lazy">
        <div class="buttons">
          <button class="btn-ok" onclick="mark('${id}', true)">✓ Correct</button>
          <button class="btn-wrong" onclick="mark('${id}', false)">✗ Wrong</button>
        </div>
      `;
      container.appendChild(div);
    }

    function mark(id, ok) {
      if (!(id in state)) reviewed++;
      else if (state[id] === true) okCount--;
      else wrongCount--;

      state[id] = ok;
      if (ok) okCount++; else wrongCount++;

      document.getElementById('ex-' + id).className = 'exercise ' + (ok ? 'ok' : 'wrong');
      document.getElementById('count').textContent = reviewed;
      document.getElementById('okCount').textContent = okCount + ' OK';
      document.getElementById('wrongCount').textContent = wrongCount + ' Wrong';
    }

    function showResults() {
      const wrong = Object.entries(state).filter(([,v]) => !v).map(([k]) => k);
      const el = document.getElementById('results');
      if (wrong.length === 0) {
        el.textContent = 'All GIFs look correct! No changes needed.';
      } else {
        el.textContent = 'WRONG GIFs (paste this to Claude):\n\n' + wrong.join('\n');
      }
      el.style.display = 'block';
      el.scrollIntoView();
    }
  </script>
</body>
</html>
