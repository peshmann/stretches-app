<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick Exercise GIFs</title>
  <style>
    body { font-family: system-ui; background: #0a0e17; color: #e8ecf4; padding: 20px; max-width: 1000px; margin: 0 auto; }
    h1 { color: #3b82f6; }
    .exercise { border: 1px solid #1f2937; border-radius: 12px; padding: 16px; margin-bottom: 24px; background: #111827; }
    .exercise-name { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
    .exercise-desc { color: #9ca3af; font-size: 14px; margin-bottom: 12px; }
    .options { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .option { border: 2px solid #1f2937; border-radius: 8px; padding: 8px; cursor: pointer; transition: all 0.2s; }
    .option:hover { border-color: #3b82f6; }
    .option.selected { border-color: #22c55e; background: #22c55e10; }
    .option.none-selected { border-color: #ef4444; background: #ef444410; }
    .option img { width: 100%; border-radius: 4px; background: #000; min-height: 120px; }
    .option-label { font-size: 11px; color: #9ca3af; margin-top: 4px; word-break: break-all; }
    .option-source { font-size: 10px; color: #60a5fa; }
    .none-btn { border: 2px dashed #ef4444; border-radius: 8px; padding: 20px; cursor: pointer; text-align: center; color: #ef4444; font-size: 14px; }
    .none-btn:hover { background: #ef444410; }
    .none-btn.none-selected { background: #ef444420; }
    #sticky { position: sticky; top: 0; background: #0a0e17; padding: 12px 0; border-bottom: 1px solid #1f2937; z-index: 10; }
    #results { font-family: monospace; font-size: 12px; white-space: pre-wrap; background: #1f2937; padding: 12px; border-radius: 8px; margin-top: 20px; display: none; }
    button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; background: #3b82f6; color: #fff; }
    button:hover { background: #2563eb; }
    p { color: #9ca3af; margin: 4px 0; }
  </style>
</head>
<body>
  <div id="sticky">
    <h1>Pick the Best GIF for Each Exercise</h1>
    <p>Click the GIF that matches the exercise. Click "None match" if nothing is right.</p>
    <p>Progress: <span id="count">0</span>/19 picked</p>
    <button onclick="showResults()">Generate Result (paste to Claude)</button>
  </div>
  <div id="exercises"></div>
  <div id="results"></div>

  <script>
    const exercises = [
      { id: 'doorway-chest-stretch', name: 'Doorway Chest Stretch', desc: 'Arm on doorframe at 90°, step through gently, feel stretch in chest/front shoulder', options: [
        { url: 'https://static.exercisedb.dev/media/3uj0Ozg.gif', label: 'dynamic chest stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/chfnQnM.gif', label: 'back pec stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/QoHIhPl.gif', label: 'behind head chest stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/ykA5tU7.gif', label: 'chest stretch with ball', src: 'ExerciseDB' },
      ]},
      { id: 'kneeling-hip-flexor', name: 'Hip Flexor Stretch (Kneeling)', desc: 'Kneel on one knee (lunge position), push hips forward to stretch front of hip', options: [
        { url: 'https://static.exercisedb.dev/media/tFGKm99.gif', label: 'hip flexor + quad stretch (rope)', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/2LQkNPW.gif', label: 'exercise ball hip flexor stretch', src: 'ExerciseDB' },
      ]},
      { id: 'neck-stretches', name: 'Neck Stretches (All Directions)', desc: 'Gently tilt head to each side, look over shoulders, chin down — gentle, no forcing', options: [
        { url: 'https://static.exercisedb.dev/media/oQRJYkC.gif', label: 'side push neck stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/x2chWLO.gif', label: 'neck side stretch', src: 'ExerciseDB' },
      ]},
      { id: 'figure-4-stretch', name: 'Figure-4 Stretch (Piriformis)', desc: 'Lie on back, cross ankle over opposite knee (making a 4), pull thigh to chest', options: [
        { url: 'https://static.exercisedb.dev/media/QY39eBr.gif', label: 'seated piriformis stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/DeDThfG.gif', label: 'seated glute stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/RQNVT10.gif', label: 'assisted lying glute/piriformis stretch', src: 'ExerciseDB' },
      ]},
      { id: 'lat-stretch', name: 'Lat Stretch (Side Bend)', desc: 'Stand/kneel, extend arm overhead, lean to opposite side to stretch lat from hip to armpit', options: [
        { url: 'https://static.exercisedb.dev/media/1jXLYEw.gif', label: 'standing lateral stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/f38OEuO.gif', label: 'kneeling lat stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/Hy9D21L.gif', label: '45° side bend', src: 'ExerciseDB' },
      ]},
      { id: 'seated-spinal-twist', name: 'Seated Spinal Twist', desc: 'Sit cross-legged, place hand on opposite knee, twist torso gently to one side', options: [
        { url: 'https://static.exercisedb.dev/media/2jl9K55.gif', label: 'spine twist', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/yT9tk17.gif', label: 'twisted leg raise', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/AX1kB0o.gif', label: 'twist hip lift', src: 'ExerciseDB' },
      ]},
      { id: 'light-cardio-a', name: 'Light Cardio Warm-up', desc: 'Rowing machine, bike, or brisk treadmill walk — just getting blood flowing', options: [
        { url: 'https://static.exercisedb.dev/media/rjiM4L3.gif', label: 'walking on incline treadmill', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/H1PESYI.gif', label: 'stationary bike run', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/J9zIWig.gif', label: 'walking high knees', src: 'ExerciseDB' },
      ]},
      { id: 'band-pull-aparts', name: 'Band Pull-Aparts', desc: 'Hold resistance band at chest height with straight arms, pull apart by squeezing shoulder blades', options: [
        { url: 'https://i.makeagif.com/media/7-06-2023/aSkry5.gif', label: 'scapular retractions with band', src: 'MakeAGif' },
        { url: 'https://static.exercisedb.dev/media/peAeMR3.gif', label: 'band shoulder press', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/VtTbiP3.gif', label: 'band pull through', src: 'ExerciseDB' },
      ]},
      { id: 'deep-neck-flexor', name: 'Deep Neck Flexor (Chin Tuck)', desc: 'Lie on back, gently tuck chin to chest (without lifting head), hold 5 seconds', options: [
        { url: 'https://i.makeagif.com/media/12-12-2024/y3xgeu.gif', label: 'chin tuck (MedBridge)', src: 'MakeAGif' },
      ]},
      { id: 'thoracic-extension', name: 'Thoracic Extension (Foam Roller)', desc: 'Foam roller under shoulder blades, hands behind head, extend/arch back over the roller', options: [
        { url: 'https://i.makeagif.com/media/6-19-2021/QYQW8W.gif', label: 'kneeling thoracic extension', src: 'MakeAGif' },
        { url: 'https://static.exercisedb.dev/media/GSDioYu.gif', label: 'upper back stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/qLpO4vV.gif', label: 'back extension on ball', src: 'ExerciseDB' },
      ]},
      { id: 'foam-roll-thoracic', name: 'Foam Roll — Thoracic Spine', desc: 'Foam roller horizontally under mid-back, arms crossed, roll up and down 6-8 inches', options: [
        { url: 'https://i.makeagif.com/media/11-01-2016/rb2_Bt.gif', label: 'foam rolling (general)', src: 'MakeAGif' },
        { url: 'https://static.exercisedb.dev/media/isofgzg.gif', label: 'roller back stretch', src: 'ExerciseDB' },
      ]},
      { id: 'foam-roll-lats', name: 'Foam Roll — Lats', desc: 'Lie on side, roller under armpit/lat area, roll up and down slowly', options: [
        { url: 'https://i.makeagif.com/media/11-01-2016/rb2_Bt.gif', label: 'foam rolling (general)', src: 'MakeAGif' },
        { url: 'https://static.exercisedb.dev/media/isofgzg.gif', label: 'roller back stretch', src: 'ExerciseDB' },
        { url: 'https://static.exercisedb.dev/media/c3Pfhti.gif', label: 'roller side lat stretch', src: 'ExerciseDB' },
      ]},
      { id: 'foam-roll-hip-flexors', name: 'Foam Roll — Hip Flexors', desc: 'Lie face down, roller under hip/front thigh area, roll slowly finding tender spots', options: [
        { url: 'https://static.exercisedb.dev/media/tFGKm99.gif', label: 'hip flexor + quad stretch', src: 'ExerciseDB' },
      ]},
      { id: 'cable-face-pulls', name: 'Cable Face Pulls', desc: 'Cable at head height, pull rope toward face, split hands apart, squeeze shoulder blades', options: [
        { url: 'https://i.makeagif.com/media/8-07-2022/ggjLIF.gif', label: 'cable face pull', src: 'MakeAGif' },
        { url: 'https://i.makeagif.com/media/2-19-2024/i4nFKk.gif', label: 'how to do cable face pulls', src: 'MakeAGif' },
      ]},
      { id: 'childs-pose', name: "Child's Pose", desc: 'Kneel on floor, sit back on heels, extend arms forward on ground, lower chest toward floor', options: [
        { url: 'https://i.makeagif.com/media/5-29-2014/GLydU_.gif', label: "child's pose yoga", src: 'MakeAGif' },
        { url: 'https://media.tenor.com/aSrCPRHv8aEAAAAC/childs-pose-yoga-pose.gif', label: "child's pose yoga pose", src: 'Tenor' },
      ]},
    ];

    // doorway-chest-priority, hip-flexor-priority, foam-roll-hip-flexors share with their base
    // childs-pose-priority shares with childs-pose
    // light-cardio-b shares with light-cardio-a

    const picks = {};
    let count = 0;

    const container = document.getElementById('exercises');
    for (const ex of exercises) {
      const div = document.createElement('div');
      div.className = 'exercise';
      div.id = 'ex-' + ex.id;

      let optionsHtml = '';
      ex.options.forEach((opt, i) => {
        optionsHtml += `
          <div class="option" id="opt-${ex.id}-${i}" onclick="pick('${ex.id}', ${i}, '${opt.url.replace(/'/g, "\\'")}')">
            <img src="${opt.url}" alt="${opt.label}" loading="lazy">
            <div class="option-label">${opt.label}</div>
            <div class="option-source">${opt.src}</div>
          </div>`;
      });

      div.innerHTML = `
        <div class="exercise-name">${ex.name}</div>
        <div class="exercise-desc"><strong>Should show:</strong> ${ex.desc}</div>
        <div class="options">
          ${optionsHtml}
          <div class="none-btn" id="none-${ex.id}" onclick="pickNone('${ex.id}')">
            ✗ None of these match
          </div>
        </div>
      `;
      container.appendChild(div);
    }

    function pick(exId, optIndex, url) {
      if (!(exId in picks)) count++;
      picks[exId] = url;
      // Clear all selections for this exercise
      document.querySelectorAll(`[id^="opt-${exId}-"]`).forEach(el => el.className = 'option');
      document.getElementById(`none-${exId}`).className = 'none-btn';
      // Highlight selected
      document.getElementById(`opt-${exId}-${optIndex}`).className = 'option selected';
      document.getElementById('count').textContent = count;
    }

    function pickNone(exId) {
      if (!(exId in picks)) count++;
      picks[exId] = 'NONE';
      document.querySelectorAll(`[id^="opt-${exId}-"]`).forEach(el => el.className = 'option');
      document.getElementById(`none-${exId}`).className = 'none-btn none-selected';
      document.getElementById('count').textContent = count;
    }

    function showResults() {
      const lines = ['PICKS (paste this to Claude):', ''];

      // Map shared IDs
      const shared = {
        'doorway-chest-stretch': ['doorway-chest-priority'],
        'kneeling-hip-flexor': ['hip-flexor-priority', 'foam-roll-hip-flexors'],
        'childs-pose': ['childs-pose-priority'],
        'light-cardio-a': ['light-cardio-b'],
      };

      for (const ex of exercises) {
        const url = picks[ex.id];
        if (!url) {
          lines.push(ex.id + ': NOT REVIEWED');
        } else if (url === 'NONE') {
          lines.push(ex.id + ': NONE');
        } else {
          lines.push(ex.id + ': ' + url);
        }
      }

      const el = document.getElementById('results');
      el.textContent = lines.join('\n');
      el.style.display = 'block';
      el.scrollIntoView();
    }
  </script>
</body>
</html>
